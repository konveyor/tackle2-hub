---
# web-ui client (with secret reference)
apiVersion: tackle.konveyor.io/v1alpha1
kind: IdpClient
metadata:
  name: web-ui
  namespace: konveyor-tackle
spec:
  id: 1
  clientId: web-ui
  applicationType: web
  grants:
    - urn:ietf:params:oauth:grant-type:jwt-bearer
    - authorization_code
    - refresh_token
  redirecturis:
    - ${issuer.proto}://${issuer.host}{,*}/**
  scopes:
    - offline_access
    - openid
    - profile
    - email

---
# kantra client (public, no secret)
apiVersion: tackle.konveyor.io/v1alpha1
kind: IdpClient
metadata:
  name: kantra
  namespace: konveyor-tackle
spec:
  id: 2
  clientId: kantra
  applicationType: native
  grants:
    - urn:ietf:params:oauth:grant-type:device_code
    - authorization_code
    - refresh_token
  redirecturis: []
  scopes:
    - offline_access
    - openid
    - profile
    - email

---
# kai-ide client (public, no secret)
apiVersion: tackle.konveyor.io/v1alpha1
kind: IdpClient
metadata:
  name: kai-ide
  namespace: konveyor-tackle
spec:
  id: 3
  clientId: kai-ide
  applicationType: native
  grants:
    - urn:ietf:params:oauth:grant-type:jwt-bearer
    - authorization_code
    - refresh_token
  redirecturis:
    - vscode://konveyor.konveyor-core/auth
    - http://127.0.0.1/callback
  scopes:
    - offline_access
    - openid
    - profile
    - email

---
# web-ui-with-secret client (confidential, with secret reference for testing)
apiVersion: tackle.konveyor.io/v1alpha1
kind: IdpClient
metadata:
  name: web-ui-with-secret
  namespace: konveyor-tackle
spec:
  id: 4
  clientId: web-ui-with-secret
  clientSecret:
    kind: Secret
    name: web-ui-secret
    namespace: konveyor-tackle
  applicationType: web
  grants:
    - urn:ietf:params:oauth:grant-type:jwt-bearer
    - authorization_code
    - refresh_token
  redirecturis:
    - ${issuer.proto}://${issuer.host}{,*}/**
  scopes:
    - offline_access
    - openid
    - profile
    - email