- id: 1
  clientId: "web-ui"
  applicationType: "web"
  grants:
    - "urn:ietf:params:oauth:grant-type:jwt-bearer"
    - "authorization_code"
    - "refresh_token"
  scopes:
    - "offline_access"
    - "openid"
    - "profile"
    - "email"

- id: 2
  clientId: "kantra"
  applicationType: "native"
  grants:
    - "urn:ietf:params:oauth:grant-type:device_code"
    - "authorization_code"
    - "refresh_token"
  scopes:
    - "offline_access"
    - "openid"
    - "profile"
    - "email"

- id: 3
  clientId: "kai-ide"
  applicationType: "native"
  grants:
    - "urn:ietf:params:oauth:grant-type:jwt-bearer"
    - "authorization_code"
    - "refresh_token"
  scopes:
    - "offline_access"
    - "openid"
    - "profile"
    - "email"
  redirectURIs:
    - vscode://konveyor.konveyor-core/auth
    - http://127.0.0.1:*
