name: Build Hub

on:
  pull_request:
    paths-ignore:
      - '**.md'
  push:
    paths-ignore:
      - '**.md'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - run: make fmt
      - run: make vet

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - run: make test

  # ───── Start Hub (ordering / visibility job) ─────
  start-hub:
    needs: test-unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Hub will be started in dependent test jobs"

  # ───── test-binding ─────
  test-binding:
    needs: [test-unit, start-hub]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - run: make vet

      - uses: ./.github/actions/start-hub
        with:
          disconnected: 'true'

      - name: Run binding tests
        run: HUB_BASE_URL=http://localhost:8080 make test-binding

  # ───── test-api ─────
  test-api:
    needs: [test-unit, start-hub]
    runs-on: ubuntu-latest
    env:
      HUB_BASE_URL: http://localhost:8080
      DB_PATH: /tmp/hub.db
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - uses: ./.github/actions/start-hub
        with:
          disconnected: 'true'
          db-path: ${{ env.DB_PATH }}

      - name: Run API tests
        run: make test-api

  # Single image build (only once)
  build-image:
    needs:
      - lint
      - test-unit
      - test-binding
      - test-api
    runs-on: ubuntu-latest
    env:
      IMG: ttl.sh/konveyor-hub-${{ github.sha }}:2h
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - run: make cmd
      - run: make docker-build
      - run: docker push ${IMG}

  test-integration:
    needs: build-image
    uses: konveyor/ci/.github/workflows/global-ci-bundle.yml@main
    with:
      tackle_hub: ttl.sh/konveyor-hub-${{ github.sha }}:2h
      api_hub_tests_ref: ${{ github.ref }}
