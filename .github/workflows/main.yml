name: Build Hub

on:
  pull_request:
    paths-ignore:
      - '**.md'
  push:
    paths-ignore:
      - '**.md'

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.25'
      - run: make fmt

  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.25'
      - run: make vet

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.25'
      - run: make cmd

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.25'
      - run: make test

  test-binding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: konveyor/tackle2-seed
      - run: |
          mkdir -p /tmp/seed
          cp -r resources/* /tmp/seed
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.25'
      - run: |
          make vet
          DISCONNECTED=1 make run &
          sleep 15  # probably a dirty solution
          HUB_BASE_URL=http://localhost:8080 make test-binding

  test-api:
    needs:
    - fmt
    - vet
    - build
    - test-unit
    runs-on: ubuntu-latest
    env:
      DISCONNECTED: 1
      HUB_BASE_URL: http://localhost:8080
      DB_PATH: /tmp/hub.db
    steps:
      - uses: actions/checkout@v4
        with:
          repository: konveyor/tackle2-seed
      - run: |
          mkdir -p /tmp/seed
          cp -r resources/* /tmp/seed
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.25'
      - run: |
          rm -f $DB_PATH
          echo "=== Starting server in background ==="
          stdbuf -oL -eL make run > /tmp/hub.log 2>&1 &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"

          echo "=== Waiting 30 seconds for server startup ==="
          for i in {1..30}; do
            sleep 1
            if grep -q "listening" /tmp/hub.log 2>/dev/null; then
              echo "Server started after $i seconds"
              break
            fi
            echo -n "."
          done
          echo ""

          echo "=== Server process status ==="
          ps aux | grep -E "PID|$SERVER_PID" || echo "Process not found"

          echo "=== Server logs ==="
          cat /tmp/hub.log || echo "No log file"

          echo "=== Running tests ==="
          make test-api

  build-image:
    needs:
    - fmt
    - vet
    - build
    - test-unit
    - test-api
    runs-on: ubuntu-latest
    env:
      IMG: ttl.sh/konveyor-hub-${{ github.sha }}:2h
    steps:
      - uses: actions/checkout@v4
      - run: make docker-build
      - run: docker push ${IMG}

  test-integration:
    needs: build-image
    uses: konveyor/ci/.github/workflows/global-ci-bundle.yml@main
    with:
      tackle_hub: ttl.sh/konveyor-hub-${{ github.sha }}:2h
      api_hub_tests_ref: ${{ github.ref }}
