name: Build Hub

on:
  pull_request:
    paths-ignore:
      - '**.md'
  push:
    paths-ignore:
      - '**.md'

env:
  REF: ${{ github.head_ref || github.ref_name }}

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v3
        with:
          go-version: '1.21'
      - run: make cmd

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v3
        with:
          go-version: '1.21'
      - run: make test

  test-binding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: konveyor/tackle2-seed
      - run: |
          mkdir -p /tmp/seed
          cp -r resources/* /tmp/seed
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v3
        with:
          go-version: '1.21'
      - run: |
          make vet
          DISCONNECTED=1 make run &
          sleep 15  # probably a dirty solution
          HUB_BASE_URL=http://localhost:8080 make test-binding

  build-images:
    uses: konveyor/ci/.github/workflows/e2e-image-build.yaml@main
    with:
      repo: ${{ inputs.repo || github.repository }}
      ref: $REF
    secrets: inherit

  run-koncur:
    runs-on: ubuntu-latest
    needs:
      - test-unit
      - test-binding
      - build-images
    steps:
      - name: Run Koncur Testing
        uses: konveyor/ci/koncur-tackle-hub@main
        with:
          image_pattern: |
            *{tackle-keycloak-init,tackle2-*,provider}--${{ github.run_id }}
          ref: ${{ github.base_ref || inputs.ref || github.ref_name}}

  test-ui:
    runs-on: ubuntu-latest
    needs:
      - test-unit
      - test-binding
      - build-images
    steps:

