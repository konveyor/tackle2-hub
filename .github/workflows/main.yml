name: Build Hub

on:
  pull_request:
    paths-ignore:
      - '**.md'
  push:
    paths-ignore:
      - '**.md'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.25'
          cache: true
      - run: make cmd

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.25'
          cache: true
      - run: make test

  test-binding:
    needs:
      - test-unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: konveyor/tackle2-seed
      - run: |
          mkdir -p /tmp/seed
          cp -r resources/* /tmp/seed
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.25'
          cache: true
      - run: |
          make vet
          DISCONNECTED=1 make run > /tmp/hub.log 2>&1 &

          # Wait for server to start (compilation can take 60+ seconds on cold cache)
          for i in {1..90}; do
            if grep -q "listening" /tmp/hub.log 2>/dev/null; then
              echo "Server ready after $i seconds"
              break
            fi
            sleep 1
          done

          HUB_BASE_URL=http://localhost:8080 make test-binding

  test-api:
    needs:
    - test-unit
    runs-on: ubuntu-latest
    env:
      DISCONNECTED: 1
      HUB_BASE_URL: http://localhost:8080
      DB_PATH: /tmp/hub.db
    steps:
      - uses: actions/checkout@v4
        with:
          repository: konveyor/tackle2-seed
      - run: |
          mkdir -p /tmp/seed
          cp -r resources/* /tmp/seed
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.25'
          cache: true
      - run: |
          rm -f $DB_PATH
          make run > /tmp/hub.log 2>&1 &

          # Wait for server to start (compilation can take 60+ seconds on cold cache)
          for i in {1..90}; do
            if grep -q "listening" /tmp/hub.log 2>/dev/null; then
              echo "Server ready after $i seconds"
              break
            fi
            sleep 1
          done

          make test-api

  build-image:
    needs:
    - build
    - test-unit
    - test-binding
    runs-on: ubuntu-latest
    env:
      IMG: ttl.sh/konveyor-hub-${{ github.sha }}:2h
    steps:
      - uses: actions/checkout@v4
      - run: make docker-build
      - run: docker push ${IMG}

  test-integration:
    needs: build-image
    uses: konveyor/ci/.github/workflows/global-ci-bundle.yml@main
    with:
      tackle_hub: ttl.sh/konveyor-hub-${{ github.sha }}:2h
      api_hub_tests_ref: ${{ github.ref }}
